<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DECOBJECTS</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>DECOBJECTS</h1>
      <nav class="barra">
        <ul>
          <li>
            <a href="">Inicio</a>
          </li>
          <li>
            <a href="#novedades">Novedades</a>
          </li>
          <li>
            <a href="#contact-me">Contactanos</a>
          </li>
        </ul>
      </nav>
    </header>
    <section>
      <div class="start">
        <div class="contenedor">
          <h2>
            SI NO TE GUSTA<br />
            DONDE ESTÁS<br />
            ¡MUEVETE! <br />
            NO ERES UN ARBOL
          </h2>
        </div>

        <div class="contenedor">
          <img src="images/oldyork.jpeg" alt="" />
        </div>
      </div>
    </section>
    <div>
      <h2 class="new">Novedades</h2>
    </div>

    <section id="novedades">
      <div class="card">
        <div class="name">Anillo CASIO</div>
        <img
          src="images/decobjects/casio.jpeg"
          alt="anillo casio"
          class="img"
        />
        <h2 class="features">Precio: 110.000</h2>
      </div>

      <div class="card">
        <div class="name">Lampara craneo</div>
        <img
          src="images/decobjects/craneo.jpeg"
          alt="lampara craneo"
          class="img"
        />
        <h2 class="features">Precio: 90.000</h2>
      </div>

      <div class="card">
        <div class="name">Bolso WINRAR</div>
        <img
          src="images/decobjects/winrar.jpeg"
          alt="bolso winrar"
          class="img"
        />
        <h2 class="features">Precio: 120.000</h2>
      </div>
    </section>

    <div>
      <h2 class="new">Contactanos</h2>
    </div>
    <section id="contact-me">
      <div class="contenedor-contactame">
        <div class="contenedor-contactame-inf">
          <label for="name-user">Nombre</label>
          <input
            type="text"
            name="name-user"
            id="name-user"
            placeholder="Nombre"
            required
          />
          <label for="telefono">Telefono</label>
          <input
            type="text"
            name="telefono"
            id="telefono"
            placeholder="Telefono"
            required
          />

          <label for="correo">Email</label>
          <input
            type="email"
            name="correo"
            id="correo"
            placeholder="example@gmail.com"
            required
          />
          <label for="comment">Mensaje</label>
          <textarea name="comment" id="comment" rows="6"></textarea>
          <input type="button" value="Enviar" />
        </div>
        <div class="contenedor-contactame-img">
          <img src="https://i.pravatar.cc/200" alt="foto" />
        </div>
      </div>
    </section>
    <footer id="foo">
      <em>Puedes contactarnos en</em>
      <div class="redes">
        <a href="https://web.facebook.com/?_rdc=1&_rdr#" target="_blank">
          <img
            class="img-redes"
            src="images/logos/logo facebook.png"
            alt="facebook"
          />
        </a>
        <a href="https://www.instagram.com/" target="_blank">
          <img
            class="img-redes"
            src="images/logos/logo instagram.png"
            alt="Instagram"
          />
        </a>
      </div>
    </footer>
  </body>
</html>
